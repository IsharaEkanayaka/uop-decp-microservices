server:
  port: 8086

spring:
  application:
    name: research-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/decp_research_db}
    username: ${POSTGRES_USER:decp_user}
    password: ${POSTGRES_PASSWORD:decp_password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: WARN
    com.decp.research: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
