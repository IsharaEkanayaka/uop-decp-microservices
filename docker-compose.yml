version: "3.8"

services:
  # Relational Database for Users, Jobs, Events, Auth, Mentorship
  postgres:
    image: postgres:15-alpine
    container_name: decp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-decp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-decp_password}
      POSTGRES_DB: ${POSTGRES_DB:-decp_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Document Database for Posts, Messages, Research Docs
  mongodb:
    image: mongo:6.0
    container_name: decp-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rootpassword}
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # In-memory Cache & Notification Batching
  redis:
    image: redis:7-alpine
    container_name: decp-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Async Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: decp-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672" # AMQP protocol port
      - "15672:15672" # Management UI
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
